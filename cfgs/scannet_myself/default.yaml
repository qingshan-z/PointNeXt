num_points: 2048
dataset:
  common:
    NAME: ScanNetMyselfH5
    data_dir: './openpoints/owndata_no_unknown_relabel200'
  train:
    split: train
    num_points: 2048
  val:
    split: test
    num_points: 2048

feature_keys: pos

datatransforms:
  train: [PointsToTensor, PointCloudScaleAndTranslate]
  vote: [PointCloudScaleAndTranslate]
  val: [PointsToTensor]
  kwargs:
    shift: [0.2, 0.2, 0.2]
batch_size: 16
dataloader:
  num_workers: 6

num_classes: 200

sched: cosine
epochs: 600
warmup_epochs: 0
min_lr: null

lr: 0.001
optimizer:
 NAME: 'adamw'
 weight_decay: 0.05

grad_norm_clip: 1

criterion_args:
  NAME: SmoothCrossEntropy
  label_smoothing: 0.2

log_dir: 'scannet_myself'
print_freq: 10
val_freq: 1

val_batch_size: 32
pretrained_path: null

wandb:
  project: PointNeXt-ScanNetMyself

seed: null
